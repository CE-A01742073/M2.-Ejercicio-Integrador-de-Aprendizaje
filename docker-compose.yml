services:
  gateway:
    build: ./gateway
    environment:
      PORT: 3000
      PHP_API_URL: http://php-api
      PYTHON_ML_URL: http://python-ml:8000
    depends_on:
      - php-api
      - python-ml
    networks:
      - dokploy-network
      - miniscrum-internal

  php-api:
    build: ./php-api
    environment:
      DB_HOST: mysql
      DB_NAME: miniscrum
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - miniscrum-internal

  python-ml:
    build: ./python-ml
    networks:
      - miniscrum-internal

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: miniscrum
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - miniscrum-internal

volumes:
  mysql_data:

networks:
  dokploy-network:
    external: true
  miniscrum-internal: